<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image"
        href="https://freepngimg.com/download/spoon/89626-fork-restaurant-food-photography-icons-computer-monochrome.png">
    <title>Kainan Ni Lodi</title>
    <style>
        body {
            background-image: url('https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExcXhvNzFrcndqemZ6dGtzNTY5aHZ4amxpazZpZHJjeTEwbXhyODJ6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/uqe7fb2xV4d68/giphy.gif');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
            padding: 0%;
            margin-bottom: 70px;
            background-color: rgb(224, 139, 184);
            color: black    ;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }


        .form-section {
            max-width: 600px;
            margin: 0 auto 50px auto;
            border: 2px solid pink;
            padding: 30px;
            background-color:   rgba(255, 149, 232, 0.95);
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        footer {
            text-align: center;
            padding: 1%;
            background-color: #333;
            color: aliceblue;

        }
    </style>
</head>
</style>

</head>

<body class="bg-light">

    <header>
        <h1>👨‍🍳 Kainan Ni Lodi</h1>
        <p class="lead">Complete Database Registration & Profile Management</p>
    </header>

    <section class="form-section">
        <h3 class="mb-4">Create Chef Account</h3>
        <form>

            <div class="row mb-3">
                <div class="col">
                    <label for="fname" class="form-label">First Name:</label>
                    <input type="text" id="fname" class="form-control" placeholder="Enter your first name" required>
                </div>
                <div class="col">
                    <label for="lname" class="form-label">Last Name:</label>
                    <input type="text" id="lname" class="form-control" placeholder="Enter your last name" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col ">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="col">
                    <label for="pass" class="form-label">Password:</label>
                    <input type="password" id="pass" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label for="bday" class="form-label">Date of Birth:</label>
                    <input type="date" id="bday" class="form-control" required>
                </div>
                <div class="col">
                    <label for="phone" class="form-label">Phone Number:</label>
                    <input type="tel" id="phone" class="form-control" placeholder="123-456-7890" required>
                </div>
            </div>

            <div class="col mb-3    ">
                <h5>Cooking Level</h5>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="level" id="beginner" value="beginner" required>
                    <label class="form-check-label" for="beginner">Beginner</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="level" id="intermediate" value="intermediate">
                    <label class="form-check-label" for="intermediate">Intermediate</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="level" id="pro" value="pro">
                    <label class="form-check-label" for="pro">Professional</label>
                </div>
            </div>

            <div class="mb-3">
                <h5>Chef Biography</h5>
                <textarea id="bio" name="bio" rows="4" class="form-control"
                    placeholder="Tell us about your culinary journey..."></textarea>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="agree" name="agree" required>
                <label class="form-check-label" for="agree">
                    I agree to the Terms and Conditions
                </label>
            </div>

            <div class="btn-container">
                <a href="index.html" class="btn btn-primary">Register</a> 
                <button type="reset" class="btn btn-secondary">Clear Form</button> <br>

              
            </div>

        </form>
    </section>


</body>

</html>
