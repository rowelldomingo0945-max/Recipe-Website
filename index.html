<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Document</title>


    <style>
        body {
            background-image: url(https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExYWVoNjNiOXh4cnZncTIwb2pzZXQwMGhhdWJuZnN5czMzbGJ0ejNrMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/dtKKMF0OxDg5jv076W/giphy.gif);
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;


        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .container {
            background-color: rgba(223, 190, 209, 0.92);
            border-radius: 15px;
            color: rgb(20, 20, 19);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-top: 100px;
        }
    </style>

</head>

<body>
    <form action="website.html">

        <div class="container">
            <h2>Log in</h2>

            <form action="website.html">

                <!-- Ginagamit na ang mb-3 sa halip na form-group para sa Bootstrap 5 -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter email" name="email" required>
                </div>

                <div class="mb-3">
                    <label for="pwd" class="form-label">Password:</label>
                    <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd"
                        required>
                </div>

                <div class="form-check mb-3">
                    <label class="form-check-label">
                        <input class="form-check-input" type="checkbox" name="remember" required> Remember me
                    </label>
                </div>


                <div class="d-grid">

                    <button type="submit" class="btn btn-primary">Log in</button>
                </div>

                <div class="text-center mt-3">
                    <p>No account? <a href="signup.html" class="text-decoration-none fw-bold">Sign Up</a></p>
                </div>

            </form>
        </div>
        

</body>

</html>
